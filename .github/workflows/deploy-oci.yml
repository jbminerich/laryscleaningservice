name: Build and Deploy to OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/laryscleaningservice-frontend

jobs:
  build-and-push:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/app
          file: ./frontend/app/public/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy on OCI host
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: ${{ secrets.OCI_PORT }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.OCI_DEPLOY_PATH }}

            git fetch --all --prune
            git checkout main
            git reset --hard ${{ github.sha }}

            mkdir -p infra/traefik/letsencrypt
            touch infra/traefik/letsencrypt/acme.json
            chmod 600 infra/traefik/letsencrypt/acme.json

            cat > infra/.env.prod <<'EOT'
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            API_INTERNAL_BASE_URL=http://backend:8000
            ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_SESSION_HOURS=${{ secrets.ADMIN_SESSION_HOURS }}
            ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
            APPOINTMENT_NOTIFICATION_TO=${{ secrets.APPOINTMENT_NOTIFICATION_TO }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
            SMTP_USE_TLS=${{ secrets.SMTP_USE_TLS }}
            LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
            EOT

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod pull
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod build backend
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d --remove-orphans
