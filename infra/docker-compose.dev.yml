services:
  traefik:
    image: traefik:v3.3
    command:
      - --api.dashboard=true
      - --providers.file.filename=/etc/traefik/dynamic.dev.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.dev.yml:/etc/traefik/dynamic.dev.yml:ro
    networks:
      - proxy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend/app:/app/app
    ports:
      - "8000:8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`api.localhost`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.services.backend.loadbalancer.server.port=8000
    networks:
      - proxy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    volumes:
      - ../frontend/app:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://api.localhost
      - API_INTERNAL_BASE_URL=http://backend:8000
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`app.localhost`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.services.frontend.loadbalancer.server.port=3000
    networks:
      - proxy

networks:
  proxy:
    driver: bridge

volumes:
  frontend_node_modules:
